<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>
        Sistema de Gestión de Turnos y Registro de Profesionales
    </h1>
    <p>
        Se enfoca en administrar turnos de pacientes con los perfiles de médicos y pacientes
    </p>
    <form action="/contacto" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" required>

        <label for="celular">Número de Teléfono:</label>
        <input type="telefono" id="celular" name="celular" required>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
